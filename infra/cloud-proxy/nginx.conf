events {
    worker_connections 1024;
}

http {
    resolver 8.8.8.8 valid=30s;

    # Auth Service
    server {
        listen 80;
        
        location /api/auth/ {
            proxy_pass http://AUTH_SERVICE_URL;
            proxy_set_header Host AUTH_HOST;
            proxy_set_header X-Real-IP \;
            proxy_set_header X-Forwarded-For \;
            proxy_set_header X-Forwarded-Proto \;
        }

        location /api/products/ {
            proxy_pass http://PRODUCT_SERVICE_URL;
            proxy_set_header Host PRODUCT_HOST;
            proxy_set_header X-Real-IP \;
            proxy_set_header X-Forwarded-For \;
            proxy_set_header X-Forwarded-Proto \;
        }

        location /api/payments/ {
            proxy_pass http://PAYMENT_SERVICE_URL;
            proxy_set_header Host PAYMENT_HOST;
            proxy_set_header X-Real-IP \;
            proxy_set_header X-Forwarded-For \;
            proxy_set_header X-Forwarded-Proto \;
        }

        location /api/audit/ {
            proxy_pass http://AUDIT_SERVICE_URL;
            proxy_set_header Host AUDIT_HOST;
            proxy_set_header X-Real-IP \;
            proxy_set_header X-Forwarded-For \;
            proxy_set_header X-Forwarded-Proto \;
        }

        location /api/ai/ {
            proxy_pass http://AI_ENGINE_URL;
            proxy_set_header Host AI_HOST;
            proxy_set_header X-Real-IP \;
            proxy_set_header X-Forwarded-For \;
            proxy_set_header X-Forwarded-Proto \;
        }

        location /api/notifications/ {
            proxy_pass http://NOTIFICATION_SERVICE_URL;
            proxy_set_header Host NOTIFICATION_HOST;
            proxy_set_header X-Real-IP \;
            proxy_set_header X-Forwarded-For \;
            proxy_set_header X-Forwarded-Proto \;
        }

        location / {
            return 404;
        }
    }
}
